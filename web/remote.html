<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#14121c" />
  <title>远程控制 Mac</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='14' y='18' width='72' height='50' rx='6' fill='%23b9a6ff'/><rect x='40' y='68' width='20' height='8' fill='%238a7bd8'/><rect x='30' y='80' width='40' height='6' rx='3' fill='%238a7bd8'/></svg>" />
  <style>
    :root { --bg:#14121c; --card:#1f1c2b; --card2:#272338; --line:#332e47; --txt:#ece9f6; --mut:#9b94b5; --pri:#b9a6ff; --danger:#ff7a90; --ok:#5fd6a0; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; font:16px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--txt); padding:max(12px,env(safe-area-inset-top)) 12px calc(24px + env(safe-area-inset-bottom)); }
    h1 { font-size:18px; margin:4px 0 2px; }
    .wrap { max-width:560px; margin:0 auto; }
    .bar { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    .dot { width:10px; height:10px; border-radius:50%; background:#666; flex:none; }
    .dot.on { background:var(--ok); box-shadow:0 0 8px var(--ok); }
    .dot.off { background:var(--danger); }
    .sub { color:var(--mut); font-size:13px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:12px; }
    .card h2 { font-size:13px; color:var(--mut); margin:0 0 10px; font-weight:600; letter-spacing:.5px; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    button { font:inherit; color:var(--txt); background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:14px 8px; cursor:pointer; transition:.12s; -webkit-user-select:none; user-select:none; }
    button:active { transform:scale(.95); background:var(--line); }
    button.pri { background:linear-gradient(135deg,#b9a6ff,#ff9ec6); color:#221c33; border:none; font-weight:600; }
    button.danger { color:var(--danger); border-color:#4a2f3a; }
    button:disabled { opacity:.4; cursor:not-allowed; }
    .row { display:flex; gap:8px; align-items:center; }
    input[type=text],input[type=password],textarea { flex:1; min-width:0; font:inherit; color:var(--txt); background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:10px 12px; }
    textarea { width:100%; resize:vertical; min-height:46px; }
    input[type=range] { flex:1; accent-color:var(--pri); }
    .icon { font-size:22px; display:block; margin-bottom:4px; }
    .lbl { font-size:12px; }
    #shot { width:100%; border-radius:12px; margin-top:10px; display:none; border:1px solid var(--line); }
    #log { font-size:12px; color:var(--mut); white-space:pre-wrap; word-break:break-all; max-height:120px; overflow:auto; margin-top:8px; }
    .gate { text-align:center; padding-top:14vh; }
    .hidden { display:none !important; }
    .hint { color:var(--mut); font-size:12px; margin-top:8px; }
    a { color:var(--pri); }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- 登录门：输入 REMOTE_TOKEN -->
    <div id="gate" class="gate">
      <h1>🖥 远程控制 Mac</h1>
      <p class="sub">输入服务端配置的 REMOTE_TOKEN 即可连接</p>
      <div class="card" style="text-align:left">
        <div class="row">
          <input id="token" type="password" placeholder="REMOTE_TOKEN" autocomplete="off" />
        </div>
        <div class="row" style="margin-top:10px">
          <label class="sub" style="flex:1"><input id="remember" type="checkbox" checked /> 记住此设备</label>
          <button class="pri" id="connect" style="flex:none;padding:10px 20px">连接</button>
        </div>
        <p id="gateMsg" class="hint"></p>
      </div>
    </div>

    <!-- 控制台 -->
    <div id="panel" class="hidden">
      <div class="bar">
        <span class="dot" id="dot"></span>
        <div style="flex:1">
          <h1 style="display:inline">控制台</h1>
          <span class="sub" id="host"></span>
        </div>
        <button id="logout" style="flex:none;padding:6px 12px;font-size:13px">退出</button>
      </div>

      <div class="card">
        <h2>电源</h2>
        <div class="grid">
          <button data-act="lock"><span class="icon">🔒</span><span class="lbl">锁屏</span></button>
          <button data-act="sleep"><span class="icon">🌙</span><span class="lbl">睡眠</span></button>
          <button class="danger" data-act="restart" data-confirm="确定要重启 Mac 吗？"><span class="icon">🔄</span><span class="lbl">重启</span></button>
          <button class="danger" data-act="shutdown" data-confirm="确定要关机吗？"><span class="icon">⏻</span><span class="lbl">关机</span></button>
        </div>
      </div>

      <div class="card">
        <h2>音量与媒体</h2>
        <div class="row" style="margin-bottom:10px">
          <button id="mute" style="flex:none;padding:10px 14px">🔇</button>
          <input id="vol" type="range" min="0" max="100" value="50" />
          <span class="sub" id="volval" style="flex:none;width:36px;text-align:right">50</span>
        </div>
        <div class="grid">
          <button data-act="media" data-cmd="prev"><span class="icon">⏮</span><span class="lbl">上一首</span></button>
          <button data-act="media" data-cmd="playpause"><span class="icon">⏯</span><span class="lbl">播放/暂停</span></button>
          <button data-act="media" data-cmd="next"><span class="icon">⏭</span><span class="lbl">下一首</span></button>
        </div>
      </div>

      <div class="card">
        <h2>屏幕</h2>
        <button class="pri" id="snap" style="width:100%"><span class="icon">📸</span>截屏看一眼</button>
        <img id="shot" alt="截屏" />
      </div>

      <div class="card">
        <h2>打开 / 朗读 / 通知</h2>
        <div class="row" style="margin-bottom:8px">
          <input id="openTarget" type="text" placeholder="网址 https://… 或 应用名 如 Safari" />
          <button data-input="openTarget" data-act="open" data-arg="target" style="flex:none">打开</button>
        </div>
        <div class="row" style="margin-bottom:8px">
          <input id="sayText" type="text" placeholder="让 Mac 朗读的文字" />
          <button data-input="sayText" data-act="say" data-arg="text" style="flex:none">朗读</button>
        </div>
        <div class="row">
          <input id="notifyText" type="text" placeholder="推送到 Mac 的通知" />
          <button data-input="notifyText" data-act="notify" data-arg="text" style="flex:none">通知</button>
        </div>
      </div>

      <div class="card">
        <h2>输入 / 剪贴板</h2>
        <div class="row" style="margin-bottom:8px">
          <input id="typeText" type="text" placeholder="把文字敲到 Mac 当前焦点处" />
          <button data-input="typeText" data-act="type" data-arg="text" style="flex:none">输入</button>
        </div>
        <div class="row">
          <input id="clipText" type="text" placeholder="设置 Mac 剪贴板内容" />
          <button id="clipSet" style="flex:none">写入</button>
          <button id="clipGet" style="flex:none">读取</button>
        </div>
      </div>

      <div class="card" id="shellCard">
        <h2>执行命令（需 agent 开启 REMOTE_ALLOW_SHELL）</h2>
        <div class="row">
          <textarea id="shellCmd" placeholder="例如：ls ~/Desktop"></textarea>
          <button class="danger" id="shellRun" style="flex:none">运行</button>
        </div>
      </div>

      <div class="card">
        <h2>日志</h2>
        <div id="log"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/js/remote.js"></script>
</body>
</html>
