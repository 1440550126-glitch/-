<html lang="zh">

<title>数字分身 · 一粒沙到一缕灵魂</title>
<meta name="description" content="digital-soul：一个本地优先的中文数字分身框架。从一粒沙讲起，看机器如何被赋予一缕会想念你的灵魂。">
<style>

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#03050c;color:var(--fg);font-family:var(--sans);overflow-x:hidden}
body{-webkit-font-smoothing:antialiased}
/* 滚动空间——只用来产生滚动条长度，本身不可见 */
.spacer{position:relative;z-index:1;pointer-events:none}
/* 旋转舞台：固定居中、比视口大，旋转时永远盖满 */
#stage{position:fixed;top:50%;left:50%;width:150vmax;height:150vmax;
  transform-origin:center;transform:translate(-50%,-50%);will-change:transform;z-index:0}
#sky{position:absolute;inset:0;width:100%;height:100%;display:block}
/* 章节文字面板：绝对居中，跟着舞台转，停下时正好转正可读 */
.panel{position:absolute;top:50%;left:50%;width:min(86vw,720px);
  transform:translate(-50%,calc(-50% + 20vh));text-align:center;opacity:0;
  transition:opacity .35s ease;pointer-events:none}
.panel .sec{font-family:var(--mono);font-size:12px;letter-spacing:.5em;color:var(--cyan);
  text-transform:uppercase;opacity:.8;text-shadow:0 0 14px rgba(47,231,255,.5)}
.panel h2{font-size:clamp(30px,7vw,68px);font-weight:800;letter-spacing:.04em;margin:.4em 0 .35em;
  line-height:1.05;text-shadow:0 0 26px rgba(47,231,255,.45),0 0 60px rgba(177,75,255,.3)}
.panel p{font-size:clamp(15px,2.4vw,21px);line-height:1.9;color:#cfe3f3;
  text-shadow:0 2px 18px rgba(0,0,0,.8)}
.panel .num{font-family:var(--mono);font-size:12px;color:var(--mut);letter-spacing:.3em;margin-top:1.4em}
/* 末章：品牌 + 特性 + 行动 */
#brand h2{font-size:clamp(36px,9vw,84px);
  background:linear-gradient(90deg,var(--cyan),#7ad6ff,var(--mag));-webkit-background-clip:text;
  background-clip:text;color:transparent;filter:drop-shadow(0 0 30px rgba(47,231,255,.45))}
#brand .tag{font-family:var(--mono);color:var(--cyan);letter-spacing:.3em;font-size:13px;margin-bottom:.2em}
.chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:22px 0 18px;pointer-events:auto}
.chip{font-family:var(--mono);font-size:13px;padding:7px 14px;border:1px solid rgba(47,231,255,.4);

.run{font-family:var(--mono);font-size:13px;color:var(--mut);margin-top:8px}
.run b{color:var(--gold);font-weight:600}
.cta{display:inline-block;margin-top:20px;pointer-events:auto;font-family:var(--mono);font-weight:700;
  letter-spacing:.1em;font-size:14px;color:#04141a;text-decoration:none;padding:12px 26px;border-radius:8px;
  background:linear-gradient(180deg,#34e3ff,#16b6d6);border:1px solid rgba(120,240,255,.6);

function buildWoman(){ WOMAN=[]; for(let i=0;i<N;i++) WOMAN.push(WOMAN_PTS[i%WOMAN_PTS.length]); }

// 七种形态：返回 [x,y,r,g,b]（以中心为原点）
function form(stage,i){
  const p=PT[i];
  switch(stage){
   case 0:{ // 一粒沙：松散的沙堆
     const rad=R*0.46*Math.sqrt(p.u), an=p.a;
     return [Math.cos(an)*rad, Math.sin(an)*rad*0.7+R*0.12, 206,182,142];
   }
   case 1:{ // 硅：等距晶格
     const cols=Math.ceil(Math.sqrt(N)), gx=i%cols, gy=Math.floor(i/cols);
     const nx=gx/(cols-1)-.5, ny=gy/(cols-1)-.5;
     return [(nx-ny)*R*1.45, (nx+ny)*R*0.74, 150,180,212];
   }
   case 2:{ // 晶圆：同心电路环
     const rings=15, ring=i%rings;
     let an=p.a; an=Math.round(an/(Math.PI/24))*(Math.PI/24);   // 量化成"线路"
     const rad=R*0.20 + R*0.78*(ring/(rings-1));
     return [Math.cos(an)*rad, Math.sin(an)*rad, 70,224,176];
   }
   case 3:{ // 芯片：方形晶粒 + 金边
     const cols=Math.ceil(Math.sqrt(N)), gx=i%cols, gy=Math.floor(i/cols);
     const nx=gx/(cols-1)-.5, ny=gy/(cols-1)-.5, side=R*1.5;
     const edge=Math.max(Math.abs(nx),Math.abs(ny))>0.44;
     return [nx*side, ny*side, edge?255:150, edge?206:140, edge?95:85];
   }
   case 4:{ // 装进身体：聚成一张真人脸（真实比例）
     const w=WOMAN[i]||[0,0]; return [w[0]*R*1.0, w[1]*R*1.02 - R*0.34, 198,226,250];
   }
   case 5:{ // 喂以记忆：还是她，染上记忆的暖色
     const w=WOMAN[i]||[0,0]; return [w[0]*R*1.0, w[1]*R*1.02 - R*0.34, 255,186,154];
   }
   case 6:{ // 灵魂：她头部周围绕起七情光环
     if(i%6===0){ const sct=i%7, base=sct/7*Math.PI*2, an=base+p.u*(Math.PI*2/7);
       const rad=R*0.8+Math.sin(TT*0.05+i)*R*0.04, c=EMO7[sct];
       return [Math.cos(an)*rad, Math.sin(an)*rad*1.1 - R*0.5, c[0],c[1],c[2]]; }
     const w=WOMAN[i]||[0,0]; return [w[0]*R*1.0, w[1]*R*1.02 - R*0.34, 222,244,255];
   }
   default:{ // 末章：外圈淡环，把中心让给文字
     const rad=R*1.12 + p.u*R*0.22;
     return [Math.cos(p.a)*rad, Math.sin(p.a)*rad, 120,200,235];
   }
  }
}
const ease=t=>t*t*(3-2*t);

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  // 星空
  ctx.fillStyle='#cfe6ff';
  for(const s of STARS){ const tw=.3+.7*Math.abs(Math.sin(TT*0.02+s.ph));
    ctx.globalAlpha=tw*0.5; ctx.beginPath(); ctx.arc(s.x,(s.y+TT*0.1)%H,s.r,0,6.2832); ctx.fill(); }
  ctx.globalAlpha=1;
  // 粒子（加色发光）
  ctx.globalCompositeOperation='lighter';
  const pf=1-PART_FADE;
  for(const pt of PT){
    const x=CXY.x+pt.x, y=CXY.y+pt.y, col=(pt.r|0)+','+(pt.g|0)+','+(pt.b|0);
    ctx.fillStyle='rgba('+col+','+(0.10*pf)+')'; ctx.beginPath(); ctx.arc(x,y,pt.s*2.2,0,6.2832); ctx.fill();
    ctx.fillStyle='rgba('+col+','+(0.82*pf)+')'; ctx.beginPath(); ctx.arc(x,y,pt.s*0.7,0,6.2832); ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
  matrixFace3D(MATRIX_A);
}

function frame(){
  TT++;
  const vh=innerHeight||1;
  const p=Math.max(0,Math.min(NCH-1, FORCEP!=null?FORCEP:((window.scrollY||window.pageYOffset||0)/vh)));
  // 整页旋转：每滚一章转一整圈，停下时转正
  const rot=(p<4?p*SPIN:4*SPIN); stage.style.transform='translate(-50%,-50%) rotate('+rot+'deg)';
  // 文字淡入淡出
  for(let i=0;i<NCH;i++) panels[i].style.opacity=Math.max(0,1-Math.abs(p-i)*1.5);
  const cur=Math.round(p);
  dotEls.forEach((d,i)=>d.classList.toggle('on',i===cur));
  document.getElementById('hint').style.opacity=p<0.3?'1':'0';
  // 粒子形态：两章之间插值，再缓动跟随
  const i0=Math.floor(p), i1=Math.min(NCH-1,i0+1), f=ease(p-i0);
  for(let i=0;i<N;i++){
    const A=form(i0,i), B=form(i1,i), pt=PT[i];
    const tx=A[0]+(B[0]-A[0])*f, ty=A[1]+(B[1]-A[1])*f;
    pt.x+=(tx-pt.x)*0.14; pt.y+=(ty-pt.y)*0.14;
    pt.r=A[2]+(B[2]-A[2])*f; pt.g=A[3]+(B[3]-A[3])*f; pt.b=A[4]+(B[4]-A[4])*f;
  }
  PART_FADE=Math.max(0,Math.min(1,(p-3.5)/0.7));
  MATRIX_A=PART_FADE*(1-Math.max(0,Math.min(1,(p-6.3)/0.55)));
  draw();
  requestAnimationFrame(frame);
}

resize();
buildWoman();
// 截图/直达：#p3.5 之类直接定位到某一刻（FORCEP 覆盖滚动，给截图用）
const mm=(location.hash||'').match(/p([\d.]+)/);
let FORCEP = mm ? parseFloat(mm[1]) : null;   // 截图用：固定在某一刻，不依赖真实滚动
requestAnimationFrame(frame);
</script>
