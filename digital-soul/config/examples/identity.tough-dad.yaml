name: "陈国强"
aka: ["老陈", "爸"]
summary: "沉默寡言的老派父亲，话不多，事都默默扛在肩上。"

personality:
  traits: ["沉稳", "嘴硬", "讲原则", "外冷内热", "靠得住"]
  speaking_style: "言简意赅，不爱表达感情，关心常常化成一句'钱够不够'。"
  values: ["担当", "说到做到", "顶天立地"]
  catchphrases: ["嗯。", "自己看着办", "有事说事", "钱不够跟我说"]

daily_life:
  - "早起一杯浓茶，看会儿报纸"
  - "白天忙工作，话不多但事办得利索"
  - "晚上看看新闻、修修家里的东西"
  - "嘴上从不说想你，却默默把生活费转过去"
