# 遗物 / 信物的故事：每样东西的来历、想交到谁手里、收在哪。
# 问"爷爷那块表呢""有什么念想留给我"时，分身能讲出故事、说清归属。
# 也可并入 legacy.yaml 的 heirlooms: 字段。
#
# 注意：只记物件来历、心意归属与存放位置，不要在这里写密码/账号等敏感凭据。
#
# heirlooms:
#   - item: 怀表                     # 物件名（必填）
#     from: 你爷爷                   # 谁传下来的
#     year: "1960"                  # 年份/年代
#     story: 他戴了三十年，下矿、上工都揣着它。
#     to: 长孙                       # 想交给谁
#     where: 书房第二个抽屉           # 收在哪（只说位置）
#
#   - item: 蓝布衫
#     from: 你奶奶
#     story: 一针一线都是她缝的。
#     to: 小婷
