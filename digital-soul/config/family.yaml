# 多人合一：一座数字宅里，住着不止一个人。
# 在这里登记多位家人，每位有自己的名字 / 称呼 / 性格 / 口头禅 / 生活。
# 之后就能：
#   · 问"我们家都有谁" → 报全家
#   · 说"我想和外公说说话""把外婆叫来" → 由 TA 本人的口吻继续聊
#   · 说"你回来吧""还是你自己来" → 把本尊请回来
# TA 们彼此知道对方存在，说话会自然提起家里其他人。
# 全本地：只是切换说话的口吻与性格，不联网、不替任何人登录。
#
# 示例（去掉前面的 # 即可启用）：
#
# members:
#   - name: 外公
#     relation: 姥爷
