# 守护提醒：分身惦记着家人的吃药 / 复查 / 重要日子，到点主动叮嘱。
# 只在本地生成提醒文本，由常驻服务(daemon)、语音或网页呈现，
# 不接触任何外部账号或设备，也不替你登录任何系统。
#
# 每位被关照的家人一项，可填：
#   medicine:  吃药时间（HH:MM，24 小时制），可多条
#   checkup:   复查日期（MM-DD），到这天提醒去复查
#   note:      吃的是什么（不填默认"药"）
#
# 示例（去掉前面的 # 即可启用）：
#
# 妈:
#   medicine:
#     - "08:00"
#     - "20:00"
#   checkup: "11-15"
#   note: 降压药
#
# 爸:
#   medicine: "21:30"
#   note: 护心的药
