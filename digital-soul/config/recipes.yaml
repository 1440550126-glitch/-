# 家传菜谱：记下 TA 的拿手菜，谁问"外婆的红烧肉怎么做"都能照着来。
# 也可以写在 config/family.yaml 某位成员的 recipes 下（会自动标注是谁的菜）。
# 全本地，不联网。
#
# 示例（去掉前面的 # 即可启用）：
#
# recipes:
#   - name: 红烧肉
#     by: 外婆
#     ingredients: [五花肉, 冰糖, 生抽, 老抽, 姜, 八角]
#     steps:
#       - 五花肉切块焯水
#       - 冰糖小火炒出糖色
#       - 下肉翻炒上色，加调料和热水
#       - 小火炖四十分钟收汁
#     note: 一定要小火，糖色别炒过头。
#
#   - name: 西红柿鸡蛋
#     ingredients: [西红柿, 鸡蛋, 糖, 盐]
#     steps: [鸡蛋打散炒好盛出, 西红柿炒出汁, 回锅加糖盐快炒]
#     note: 放一点点糖，味道更柔。
