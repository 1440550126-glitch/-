<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>句灵 · 管理后台</title>
  <style>
    :root { --bg:#f4f2fa; --ink:#3a3550; --ink2:#8a84a6; --brand:#8d7ae6; --brand2:#ff8fb3; --line:#e8e4f5; --ok:#36b58a; --warn:#e8694c; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"PingFang SC",system-ui,sans-serif; background:var(--bg); color:var(--ink); font-size:14px; }
    button { font-family:inherit; cursor:pointer; border:0; }
    .layout { display:flex; min-height:100vh; }
    aside { width:200px; background:#fff; border-right:1px solid var(--line); padding:18px 12px; position:sticky; top:0; height:100vh; flex-shrink:0; }
    aside h1 { font-size:18px; padding:0 10px 16px; background:linear-gradient(135deg,#a18bff,#ff9ec6); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .menu button { display:block; width:100%; text-align:left; padding:10px 12px; border-radius:10px; background:none; color:var(--ink2); font-size:13.5px; margin-bottom:2px; }
    .menu button.on { background:linear-gradient(135deg,rgba(161,139,255,.14),rgba(255,158,198,.14)); color:var(--brand); font-weight:600; }
    main { flex:1; padding:22px; max-width:1200px; }
    h2 { font-size:17px; margin-bottom:14px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:12px; margin-bottom:18px; }
    .stat { background:#fff; border-radius:14px; padding:14px 16px; border:1px solid var(--line); }
    .stat .v { font-size:22px; font-weight:800; margin-top:4px; }
    .stat .k { font-size:11.5px; color:var(--ink2); }
    table { width:100%; background:#fff; border-radius:14px; border:1px solid var(--line); border-collapse:separate; border-spacing:0; overflow:hidden; font-size:12.5px; }
    th { text-align:left; padding:10px 12px; background:#faf9fe; color:var(--ink2); font-weight:600; font-size:11.5px; white-space:nowrap; }
    td { padding:9px 12px; border-top:1px solid var(--line); vertical-align:top; max-width:340px; overflow-wrap:break-word; }
    .btn { padding:6px 12px; border-radius:9px; background:var(--brand); color:#fff; font-size:12px; margin:1px 2px; }
    .btn.ghost { background:#f0edfb; color:var(--brand); }
    .btn.warn { background:var(--warn); }
    .btn.ok { background:var(--ok); }
    .tag { display:inline-block; padding:2px 8px; border-radius:99px; font-size:10.5px; background:#f0edfb; color:var(--brand); margin:1px; }
    .tag.red { background:#fdeae5; color:var(--warn); } .tag.green { background:#e3f6ef; color:var(--ok); } .tag.gray { background:#eee; color:#888; }
    input, select { padding:8px 12px; border-radius:10px; border:1px solid var(--line); font-size:13px; outline:none; background:#fff; font-family:inherit; }
    input:focus { border-color:var(--brand); }
    .row { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
    .login-box { max-width:340px; margin:14vh auto; background:#fff; padding:30px; border-radius:18px; border:1px solid var(--line); }
    .login-box h1 { text-align:center; margin-bottom:18px; font-size:20px; }
    .login-box input { width:100%; margin-bottom:12px; padding:11px 14px; }
    .login-box .btn { width:100%; padding:11px; font-size:14px; }
    .field-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; background:#fff; padding:16px; border-radius:14px; border:1px solid var(--line); margin-bottom:14px; }
    .field-grid label { display:block; font-size:11.5px; color:var(--ink2); margin-bottom:5px; }
    .field-grid input { width:100%; }
    .muted { color:var(--ink2); font-size:11.5px; }
    #toast { position:fixed; top:16px; right:16px; z-index:99; }
    #toast div { background:#3a3550; color:#fff; padding:10px 16px; border-radius:10px; margin-bottom:8px; font-size:13px; animation:fade .3s; }
    @keyframes fade { from { opacity:0; transform:translateY(-8px); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="toast"></div>
  <script type="module" src="/admin/admin.js"></script>
</body>
</html>
