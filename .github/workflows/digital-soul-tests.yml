name: digital-soul tests

on:
  push:
    paths:
      - "digital-soul/**"
  pull_request:
    paths:
      - "digital-soul/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digital-soul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core dependency
        run: pip install pyyaml
      - name: Compile check
        run: python -m compileall -q dsoul scripts
      - name: Run unit tests
        run: |
          for t in authority memory annotate presence consolidate emotions skills dispatch tasks reflect plan butler devices orchestrate scenes triggers ha graph voice forgetting entangle dream selfnarrative values monologue curiosity worldmodel anticipate predict swarm style memorial lifelog habits photo llm legacy guardian family webstatus keepsake converse briefing book letters calendar reminisce gratitude timecapsule wishes notes recipes sayings qa_interview social goals kinship festival shopping comfort_stages mannerisms anniversary heirloom genealogy health_history solar_terms favors storytelling teaching heritage spouse loveletter companion encourage celebrate preferences humor smalltalk medication safety_check appointments inner_life opinions worries joys chat_starters proverbs memory_lane gift_ideas habit_goals festival_prep cooking_today praise weather_day exercise_coach comfort_fear mediate games boredom contacts emergency household_ledger bedtime_stories music plant_care tcm_wellness keep_in_touch daily_digest thinking followup reason_through clarify observe understanding reach_out messages weekly_review dignity vitals family_board growth_log pets mood_lifter express_feelings continuity self_share gentle_insist follow_through affection embodiment; do
            echo "== $t =="
            python tests/test_$t.py
          done
