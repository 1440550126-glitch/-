<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0d0b14" />
  <meta name="description" content="魔镜魔镜——手机摄像头一键瘦身美颜，拍照拍视频都能美，支持自定义修图。全程本地处理，不上传画面。" />
  <title>魔镜魔镜 🪞</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23ff9ec6'/><stop offset='1' stop-color='%23b9a6ff'/></linearGradient></defs><rect width='100' height='100' rx='24' fill='%230d0b14'/><ellipse cx='50' cy='48' rx='28' ry='34' fill='none' stroke='url(%23g)' stroke-width='5'/><ellipse cx='50' cy='48' rx='28' ry='34' fill='url(%23g)' opacity='.18'/><path d='M40 32 Q44 28 50 28' stroke='%23fff' stroke-width='4' fill='none' stroke-linecap='round' opacity='.8'/></svg>" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <!-- 摄像头原始画面（隐藏，仅作纹理来源） -->
  <video id="cam" playsinline webkit-playsinline muted aria-hidden="true"></video>
  <!-- 处理后的实时预览 -->
  <canvas id="stage"></canvas>
  <!-- 补光 / 快门闪光 -->
  <div id="flash"></div>

  <header class="topbar">
    <button id="btn-close" class="icon-btn" aria-label="关闭">✕</button>
    <div class="top-right">
      <button id="btn-flash" class="icon-btn" aria-label="补光">💡<span>补光</span></button>
      <button id="btn-face" class="icon-btn" aria-label="自动瘦脸" hidden>🎯<span>瘦脸</span></button>
      <button id="btn-flip" class="icon-btn" aria-label="翻转镜头">🔄<span>翻转</span></button>
    </div>
  </header>

  <button id="btn-compare" class="compare">按住看原图</button>
  <div id="rec-timer" class="rec-timer" hidden>● 00:00</div>

  <section id="panel" class="panel">
    <div id="tab-content"></div>
    <nav class="tabs">
      <button data-tab="beauty" class="active">美颜</button>
      <button data-tab="filter">滤镜</button>
      <button data-tab="slim">瘦身</button>
      <button data-tab="custom">自定义</button>
    </nav>
  </section>

  <footer class="shutter-row">
    <button id="thumb" class="thumb" aria-label="最近作品"></button>
    <button id="shutter" class="shutter" aria-label="快门"><span class="shutter-inner"></span></button>
    <div class="mode-switch">
      <button data-mode="photo" class="active">拍照</button>
      <button data-mode="video">录像</button>
    </div>
  </footer>

  <div id="result" class="result" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <!-- 启动 / 授权页 -->
  <div id="boot" class="boot">
    <div class="boot-card">
      <div class="boot-logo">🪞</div>
      <h1 class="boot-title">魔镜魔镜</h1>
      <p class="boot-sub">一键瘦身美颜 · 拍照拍视频 · 全程本地不上传</p>
      <p class="boot-msg">正在唤醒镜子，请允许使用摄像头…</p>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
